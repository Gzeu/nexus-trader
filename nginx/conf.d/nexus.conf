# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS main server ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN_OR_IP;

    # TLS — replace with real certs (Let's Encrypt recommended)
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # API proxy
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://nexus-trader:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # No caching for API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # WebSocket upgrade
    location /ws {
        limit_req zone=ws burst=10 nodelay;

        proxy_pass http://nexus-trader:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Grafana dashboard
    location /grafana/ {
        proxy_pass http://nexus-grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        auth_basic "Nexus Monitoring";
        auth_basic_user_file /etc/nginx/ssl/.htpasswd;
    }

    # Health check (public, no auth)
    location /health {
        proxy_pass http://nexus-trader:8000/api/v1/health;
        access_log off;
    }

    # Block direct access to sensitive endpoints from internet
    location ~ ^/api/v1/(emergency_stop|cancel_all|close_all) {
        # Allow only from trusted IPs
        # allow 1.2.3.4;  # ← adaugă IP-ul tău fix
        # deny all;
        limit_req zone=api burst=3 nodelay;
        proxy_pass http://nexus-trader:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
