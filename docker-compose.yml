version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: nexus-trader-backend:latest
    container_name: nexus-trader-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - journal_data:/app/journal_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - nexus-net

  frontend:
    image: node:20-alpine
    container_name: nexus-trader-frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - nexus-net

volumes:
  journal_data:
    driver: local

networks:
  nexus-net:
    driver: bridge
